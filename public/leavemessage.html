<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="contact form">
    <base target="_top">
    <link rel="icon" href="../assets/images/KEN_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
        integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../style.css" />
</head>

<body>
    <div class="flex-box-two-ends">
        <div class="box">
            <h2>Leave Message</h2>
        </div>
        <a href="../index.html">
            <div class="box">
                <h2>home</h2>
            </div>
        </a>
    </div>
    <hr />
    <aside>
        <p>
            I would <em>love</em> to hear from you! </p>
        <p>Please use the below <b><em>Contact Form</em></b>
            to send me a message.
        </p>
    </aside>

    <form class="gform pure-form pure-form-stacked" autocomplete="off" method="POST" 
    action="https://script.google.com/macros/s/AKfycbzMkKV4RqyXT9EEjMspSlHzq4embKbn1m88W1HtNDKWDtYoRTlD4ibZrYnCSlYJqtF8Zw/exec">

        <div class="form-elements">
            <fieldset class="pure-group">
                <label for="name">Name: </label>
                <input id="name" name="name" placeholder="What other calls you" />
            </fieldset>

            <fieldset class="pure-group">
                <label for="message" style="vertical-align: top;">Message: </label>
                <textarea id="message" name="message" rows="10" placeholder="Tell us what's on your mind..."></textarea>
            </fieldset>

            <fieldset class="pure-group">
                <label for="email"><em>Your</em> Email Address:</label>
                <input id="email" name="email" type="email" value="" required placeholder="your.name@email.com" />
                <span id="email-invalid" style="visibility:hidden">
                    Must be a valid email address</span>
            </fieldset>

            <!-- <fieldset class="pure-group">
                <label for="color">Favourite Color: </label>
                <input id="color" name="color" placeholder="green" />
            </fieldset> -->
            
            <fieldset class="pure-group honeypot-field">
                <label for="honeypot">To help avoid spam, utilize a Honeypot technique with a hidden text field; must be empty to
                    submit the form! Otherwise, we assume the user is a spam bot.</label>
                <input id="honeypot" type="text" name="honeypot" value="" />
            </fieldset>

            <button class="button-success pure-button button-xlarge">
                <div class="box">
                    <h2><i class="fa fa-paper-plane"></i>&nbsp;Send</h2>
                </div>
            </button>
            <!-- <p>(BETA, expect not working at the moment!)</p> -->
        </div>

        <!-- Customise the Thankyou Message People See when they submit the form: -->
        <div style="display:none;" class="thankyou_message">
            <h2><em>Thanks</em> for contacting me!
                I will get back to you soon!</h2>
        </div>
    </form>

    <!-- Submit the Form to Google Using "AJAX" -->
    <script data-cfasync="false" type="text/javascript" src="./form-submission-handler.js"></script>

    <!-- END -->

</body>

</html>
